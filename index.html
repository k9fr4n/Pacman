<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAC / GRID — Tron Legacy Pac-Man</title>
  <link rel="stylesheet" href="./styles.css" />
  <!--
    ============================================================
     PAC / GRID  —  a Tron Legacy themed Pac-Man (Three.js)
     Author       : Ecritel / Franck SALLET
     Last-Modified: 2026-04-17
    ============================================================
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div class="hud-row top">
      <div class="hud-block">
        <div class="label">SCORE</div>
        <div id="score" class="value">0</div>
      </div>
      <div class="hud-block center">
        <div class="label">PAC / GRID</div>
        <div id="level" class="value subtle">LEVEL 01</div>
      </div>
      <div class="hud-block right">
        <div class="label">LIVES</div>
        <div id="lives" class="value">▲ ▲ ▲</div>
      </div>
    </div>
  </div>

  <div id="overlay" class="visible">
    <div class="panel">
      <h1>PAC / GRID</h1>
      <p class="tagline">ENTER THE GRID</p>
      <ul class="controls">
        <li><kbd>◀ ▲ ▼ ▶</kbd> / <kbd>WASD</kbd> — MOVE</li>
        <li><kbd>P</kbd> — PAUSE</li>
        <li><kbd>M</kbd> — MUTE</li>
      </ul>
      <button id="startBtn">INITIATE</button>
      <p class="hint">click / tap to enable audio</p>
    </div>
  </div>

  <div id="message" class="flash"></div>

  <canvas id="stage"></canvas>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
